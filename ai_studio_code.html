<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>1-Minute Punjabi</title>
    <!-- PWA Magic -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#FFF9F0">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/197/197601.png">

    <style>
        :root {
            --bg: #FFF9F0;
            --card-front: #FFD93D;
            --card-back: #FFFFFF;
        }

        body {
            font-family: 'Comic Sans MS', 'Chalkboard SE', sans-serif;
            background-color: var(--bg);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
            -webkit-tap-highlight-color: transparent;
        }

        .date-display { position: absolute; top: 40px; font-weight: bold; color: #FF8C00; letter-spacing: 1px; }

        .card-container { width: 320px; height: 460px; perspective: 1000px; }
        .card {
            width: 100%; height: 100%; position: relative;
            transform-style: preserve-3d; transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
            border-radius: 35px; box-shadow: 0 15px 35px rgba(0,0,0,0.1); cursor: pointer;
        }
        .card.is-flipped { transform: rotateY(180deg); }
        .card-face {
            position: absolute; width: 100%; height: 100%;
            backface-visibility: hidden; display: flex; flex-direction: column;
            align-items: center; justify-content: center; border-radius: 35px;
            padding: 30px; box-sizing: border-box; border: 8px solid white;
        }
        .card-front { background-color: var(--card-front); }
        .card-back { background-color: var(--card-back); transform: rotateY(180deg); }

        .emoji { font-size: 90px; margin-bottom: 10px; }
        .punjabi-word { font-size: 3.2rem; color: #D35400; margin: 0; text-align: center; }
        
        .speaker-btn {
            background: #FF6B6B; border: none; width: 65px; height: 65px;
            border-radius: 50%; cursor: pointer; display: flex;
            align-items: center; justify-content: center; margin-bottom: 20px;
        }
        .speaker-btn svg { fill: white; width: 30px; }

        .translation-item { margin: 10px 0; text-align: center; }
        .lang-label { font-size: 0.7rem; color: #AAA; text-transform: uppercase; }
        .meaning { font-size: 1.6rem; margin: 0; font-weight: bold; }
        .eng { color: #2E86C1; } .hin { color: #27AE60; } .tel { color: #8E44AD; }
    </style>
</head>
<body>

    <div class="date-display" id="todayDate">DAILY WORD</div>

    <div class="card-container">
        <div class="card" id="mainCard" onclick="handleCardTap(event)">
            <div class="card-face card-front">
                <div class="emoji" id="displayEmoji"></div>
                <h2 class="punjabi-word" id="displayPunjabi"></h2>
                <p style="color:rgba(0,0,0,0.2); margin-top:20px;">Tap to see meaning!</p>
            </div>
            <div class="card-face card-back">
                <button class="speaker-btn" onclick="playAudio(event)">
                    <svg viewBox="0 0 24 24"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02z"/></svg>
                </button>
                <div id="displayPron" style="color:#888; font-style:italic; margin-bottom:15px;"></div>
                <div class="translation-item"><div class="lang-label">English</div><p class="meaning eng" id="displayEng"></p></div>
                <div class="translation-item"><div class="lang-label">Hindi</div><p class="meaning hin" id="displayHin"></p></div>
                <div class="translation-item"><div class="lang-label">Telugu</div><p class="meaning tel" id="displayTel"></p></div>
            </div>
        </div>
    </div>

    <script>
        const words = [
            { p: "ਸਤਿ ਸ੍ਰੀ ਅਕਾਲ", pr: "Sat-Sri-A-Kaal", en: "Hello", hi: "नमस्ते", te: "నమస్కారం", em: "🙏" },
            { p: "ਧੰਨਵਾਦ", pr: "Dhan-vaad", en: "Thank You", hi: "धन्यवाद", te: "ధన్యవాదాలు", em: "🌸" },
            { p: "ਤੁਸੀਂ ਕਿਵੇਂ ਹੋ?", pr: "Tusi kive ho?", en: "How are you?", hi: "आप कैसे हैं?", te: "మీరు ఎలా ఉన్నారు?", em: "😊" },
            { p: "ਜੀ ਆਇਆਂ ਨੂੰ", pr: "Ji Aayan Nu", en: "Welcome", hi: "स्वागत", te: "స్వాగతం", em: "🏡" }
        ];

        const dayOfYear = Math.floor((new Date() - new Date(new Date().getFullYear(), 0, 0)) / 86400000);
        const dailyWord = words[dayOfYear % words.length];

        document.getElementById('displayPunjabi').innerText = dailyWord.p;
        document.getElementById('displayEmoji').innerText = dailyWord.em;
        document.getElementById('displayPron').innerText = dailyWord.pr;
        document.getElementById('displayEng').innerText = dailyWord.en;
        document.getElementById('displayHin').innerText = dailyWord.hi;
        document.getElementById('displayTel').innerText = dailyWord.te;
        document.getElementById('todayDate').innerText = new Date().toLocaleDateString('en-US', {month:'short', day:'numeric'});

        function handleCardTap(e) { if (!e.target.closest('.speaker-btn')) document.getElementById('mainCard').classList.toggle('is-flipped'); }
        
        function playAudio(e) {
            e.stopPropagation();
            const msg = new SpeechSynthesisUtterance(dailyWord.p);
            msg.lang = 'pa-IN';
            window.speechSynthesis.speak(msg);
        }

        // Register Service Worker for PWA
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js');
        }
    </script>
</body>
</html>
