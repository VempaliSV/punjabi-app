<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>1-Minute Punjabi</title>
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <style>
        :root {
            --bg: #FFF9E6; 
            --card-front: #FFD93D;
            --card-back: #FFFFFF;
            --punjabi-text: #D35400; 
        }

        body {
            font-family: 'Comic Sans MS', 'Chalkboard SE', sans-serif;
            background-color: var(--bg);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
            touch-action: manipulation;
        }

        /* Progress Header */
        .header { position: absolute; top: 20px; text-align: center; }
        .header h1 { font-size: 1.2rem; color: #E67E22; margin: 0; }
        .counter { font-size: 0.8rem; color: #AAA; }

        /* The Card */
        .card-container { width: 320px; height: 450px; perspective: 1000px; }
        .card {
            width: 100%; height: 100%; position: relative;
            transform-style: preserve-3d; transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
            border-radius: 40px; box-shadow: 0 15px 35px rgba(0,0,0,0.1); cursor: pointer;
        }
        .card.is-flipped { transform: rotateY(180deg); }

        .card-face {
            position: absolute; width: 100%; height: 100%;
            backface-visibility: hidden; display: flex; flex-direction: column;
            align-items: center; justify-content: center; border-radius: 40px;
            padding: 30px; box-sizing: border-box; border: 8px solid white;
        }

        .card-front { background-color: var(--card-front); }
        .card-back { background-color: var(--card-back); transform: rotateY(180deg); }

        .emoji { font-size: 100px; margin-bottom: 10px; }
        .punjabi-word { font-size: 3rem; color: var(--punjabi-text); margin: 0; text-align: center; }
        
        /* Audio Button - Big and Pulsing */
        .speaker-btn {
            background: #FF6B6B; border: none; width: 85px; height: 85px;
            border-radius: 50%; cursor: pointer; display: flex;
            align-items: center; justify-content: center; margin-bottom: 20px;
            box-shadow: 0 8px 20px rgba(255, 107, 107, 0.4);
            animation: pulse 2s infinite;
        }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }
        .speaker-btn svg { fill: white; width: 40px; }

        .meaning-box { text-align: center; margin: 10px 0; }
        .label { font-size: 0.7rem; color: #BBB; text-transform: uppercase; }
        .meaning { font-size: 1.6rem; margin: 0; font-weight: bold; }

        .eng { color: #2E86C1; } .hin { color: #27AE60; } .tel { color: #8E44AD; }

        /* Nav */
        .nav-controls { display: flex; gap: 40px; margin-top: 30px; }
        .nav-btn {
            background: white; border: none; padding: 15px 30px;
            border-radius: 20px; font-weight: bold; color: #888;
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
        }
    </style>
</head>
<body>

    <div class="header">
        <h1 id="topTitle">1-Minute Punjabi</h1>
        <div class="counter" id="cardCount">Card 1</div>
    </div>

    <div class="card-container">
        <div class="card" id="mainCard" onclick="handleFlip(event)">
            <div class="card-face card-front">
                <div class="emoji" id="e">🙏</div>
                <h2 class="punjabi-word" id="p">ਸਤਿ ਸ੍ਰੀ ਅਕਾਲ</h2>
                <p style="color:rgba(0,0,0,0.2); font-weight:bold; margin-top:40px;">TAP TO LEARN</p>
            </div>
            <div class="card-face card-back">
                <button class="speaker-btn" onclick="playPunjabi(event)">
                    <svg viewBox="0 0 24 24"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02z"/></svg>
                </button>
                <div class="meaning-box"><div class="label">English</div><p class="meaning eng" id="en"></p></div>
                <div class="meaning-box"><div class="label">Hindi</div><p class="meaning hin" id="hi"></p></div>
                <div class="meaning-box"><div class="label">Telugu</div><p class="meaning tel" id="te"></p></div>
            </div>
        </div>
    </div>

    <div class="nav-controls">
        <button class="nav-btn" onclick="move(-1)">← Back</button>
        <button class="nav-btn" onclick="move(1)">Next →</button>
    </div>

    <script>
        const library = [
            { p: "ਸਤਿ ਸ੍ਰੀ ਅਕਾਲ", en: "Hello", hi: "नमस्ते", te: "నమస్కారం", em: "🙏" },
            { p: "ਧੰਨਵਾਦ", en: "Thank You", hi: "धन्यवाद", te: "ధన్యవాదాలు", em: "🌸" },
            { p: "ਪਾਣੀ", en: "Water", hi: "पानी", te: "నీరు", em: "💧" },
            { p: "ਰੋਟੀ", en: "Food", hi: "रोटी", te: "ఆహారం", em: "🍞" },
            { p: "ਸੇਬ", en: "Apple", hi: "सेब", te: "ఆపిల్", em: "🍎" },
            { p: "ਬਿੱਲੀ", en: "Cat", hi: "बिल्ली", te: "పిల్లి", em: "🐱" },
            { p: "ਕੁੱਤਾ", en: "Dog", hi: "कुत्ता", te: "కుక్క", em: "🐶" },
            { p: "ਸੂਰਜ", en: "Sun", hi: "सूरज", te: "సూర్యుడు", em: "☀️" },
            { p: "ਘਰ", en: "Home", hi: "घर", te: "ఇల్లు", em: "🏡" },
            { p: "ਕਿਤਾਬ", en: "Book", hi: "ਕਿਤਾਬ", te: "పుస్తకం", em: "📚" }
        ];

        let idx = 0;
        let voicesLoaded = false;

        function update() {
            const d = library[idx];
            document.getElementById('p').innerText = d.p;
            document.getElementById('e').innerText = d.em;
            document.getElementById('en').innerText = d.en;
            document.getElementById('hi').innerText = d.hi;
            document.getElementById('te').innerText = d.te;
            document.getElementById('cardCount').innerText = `Card ${idx + 1} of ${library.length}`;
            document.getElementById('mainCard').classList.remove('is-flipped');
        }

        function handleFlip(e) {
            if (e.target.closest('.speaker-btn')) return;
            
            // "Wake up" audio engine on first interaction (Required for Mobile)
            if(!voicesLoaded) {
                const silentValue = new SpeechSynthesisUtterance("");
                window.speechSynthesis.speak(silentValue);
                voicesLoaded = true;
            }
            
            document.getElementById('mainCard').classList.toggle('is-flipped');
        }

        function move(n) {
            idx = (idx + n + library.length) % library.length;
            update();
        }

        function playPunjabi(e) {
            e.stopPropagation();
            const text = library[idx].p;
            const msg = new SpeechSynthesisUtterance(text);
            
            // Set Language to Punjabi
            msg.lang = 'pa-IN';
            msg.rate = 0.7; // Slow for kids
            
            // Find Punjabi voice among system voices
            const voices = window.speechSynthesis.getVoices();
            const paVoice = voices.find(v => v.lang.includes('pa') || v.lang.includes('punjabi'));
            if(paVoice) msg.voice = paVoice;

            window.speechSynthesis.cancel();
            window.speechSynthesis.speak(msg);
        }

        // Initialize
        update();
        window.speechSynthesis.getVoices(); // Pre-load
    </script>
</body>
</html>
