<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>1-Minute Punjabi</title>
    <script src="words.js"></script>
    
    <style>
        :root {
            --bg: #FFF9E6; 
            --card-front: #FFD93D;
            --card-back: #FFFFFF;
            --punjabi-text: #D35400; 
        }

        body {
            font-family: 'Comic Sans MS', 'Chalkboard SE', sans-serif;
            background-color: var(--bg);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
            touch-action: manipulation;
        }

        .header { position: absolute; top: 20px; text-align: center; }
        .header h1 { font-size: 1.4rem; color: #E67E22; margin: 0; }
        #counter { font-size: 0.8rem; color: #AAA; }

        .card-container { width: 320px; height: 480px; perspective: 1000px; }
        .card {
            width: 100%; height: 100%; position: relative;
            transform-style: preserve-3d; transition: transform 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border-radius: 40px; box-shadow: 0 20px 40px rgba(0,0,0,0.1); cursor: pointer;
        }
        .card.is-flipped { transform: rotateY(180deg); }

        .card-face {
            position: absolute; width: 100%; height: 100%;
            backface-visibility: hidden; display: flex; flex-direction: column;
            align-items: center; justify-content: center; border-radius: 40px;
            padding: 20px; box-sizing: border-box; border: 10px solid white;
        }

        .card-front { background-color: var(--card-front); }
        .card-back { background-color: var(--card-back); transform: rotateY(180deg); }

        .emoji { font-size: 80px; margin-bottom: 10px; }
        .punjabi-word { font-size: 3rem; color: var(--punjabi-text); margin: 0; text-align: center; }
        
        /* NEW: Pronunciation Style */
        .pronunciation {
            font-size: 1.1rem;
            color: #888;
            font-style: italic;
            margin-bottom: 15px;
            background: #fdf2d5;
            padding: 5px 15px;
            border-radius: 12px;
        }

        .speaker-btn {
            background: #FF6B6B; border: none; width: 70px; height: 70px;
            border-radius: 50%; cursor: pointer; display: flex;
            align-items: center; justify-content: center; margin-bottom: 15px;
            box-shadow: 0 6px 15px rgba(255, 107, 107, 0.3);
        }
        .speaker-btn svg { fill: white; width: 30px; }

        .meaning { font-size: 1.5rem; margin: 4px 0; font-weight: bold; }
        .eng { color: #2E86C1; } .hin { color: #27AE60; } .tel { color: #8E44AD; }

        .nav { display: flex; gap: 30px; margin-top: 30px; }
        .btn { background: white; border: none; padding: 15px 30px; border-radius: 20px; color: #888; font-weight: bold; box-shadow: 0 4px 10px rgba(0,0,0,0.05); cursor: pointer; }
    </style>
</head>
<body>

    <div class="header">
        <h1>1-Minute Punjabi</h1>
        <div id="counter">Card 1</div>
    </div>

    <div class="card-container">
        <div class="card" id="mainCard" onclick="handleFlip(event)">
            <!-- FRONT -->
            <div class="card-face card-front">
                <div class="emoji" id="e"></div>
                <h2 class="punjabi-word" id="p"></h2>
                <div style="color:rgba(0,0,0,0.1); margin-top:30px; font-weight:bold;">TAP TO REVEAL</div>
            </div>
            <!-- BACK -->
            <div class="card-face card-back">
                <button class="speaker-btn" onclick="playAudio(event)">
                    <svg viewBox="0 0 24 24"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02z"/></svg>
                </button>
                
                <!-- Pronunciation Element -->
                <div id="pr" class="pronunciation"></div>

                <p class="meaning eng" id="en"></p>
                <p class="meaning hin" id="hi"></p>
                <p class="meaning tel" id="te"></p>
            </div>
        </div>
    </div>

    <div class="nav">
        <button class="btn" onclick="move(-1)">← Back</button>
        <button class="btn" onclick="move(1)">Next →</button>
    </div>

    <script>
        let currentIdx = 0;
        const synth = window.speechSynthesis;

        function updateUI() {
            const item = library[currentIdx];
            document.getElementById('p').innerText = item.p;
            document.getElementById('e').innerText = item.em;
            
            // Show the Pronunciation
            document.getElementById('pr').innerText = item.pr;
            
            document.getElementById('en').innerText = item.en;
            document.getElementById('hi').innerText = item.hi;
            document.getElementById('te').innerText = item.te;
            document.getElementById('counter').innerText = `Card ${currentIdx + 1} of ${library.length}`;
            document.getElementById('mainCard').classList.remove('is-flipped');
        }

        function handleFlip(e) {
            if (e.target.closest('button')) return;
            document.getElementById('mainCard').classList.toggle('is-flipped');
        }

        function move(step) {
            currentIdx = (currentIdx + step + library.length) % library.length;
            updateUI();
        }

        function playAudio(e) {
            e.stopPropagation();
            synth.cancel();
            const msg = new SpeechSynthesisUtterance(library[currentIdx].p);
            msg.lang = 'pa-IN';
            msg.rate = 0.8;
            
            const voices = synth.getVoices();
            const paVoice = voices.find(v => v.lang.includes('pa'));
            if(paVoice) msg.voice = paVoice;

            synth.speak(msg);
        }

        window.onload = updateUI;
        // Pre-load voices for Chrome
        synth.onvoiceschanged = () => synth.getVoices();
    </script>
</body>
</html>
